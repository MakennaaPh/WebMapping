<!DOCTYPE html>
<html>

<head>
  <meta charset='utf-8' />
  <title>University of Oregon Mapping</title>
  <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
  <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css' rel='stylesheet' />
  <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js'></script>

  <style>
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
      height: 100vh;
    }
    #title {
      position: absolute;
      top: 10px;
      left: 10px;
      background: navajowhite;
      padding: 10px;
      font-family: "Calibri", Candara, Segoe, "Segoe UI", Optima, Arial, sans-serif;
      z-index: 1;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div id="title">
    <h2>Earthquakes Map</h2>
  </div>

  <div id="map"></div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoibWFrZW5uYWFwaGlsbGlwcyIsImEiOiJjbW5wNGk0dDgyYzlrMnJxNXI4dDdzMHc1In0.iFOEbvb6cI1ZBb1o0Qcl8g';
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/makennaaphillips/cmohr32pl000001si27f9bgi5',
      center: [-120.0376237175638, 42.074513742447216],
      zoom: 5.5
    });
    map.addControl(new mapboxgl.NavigationControl());
  </script>

</body>

</html>
